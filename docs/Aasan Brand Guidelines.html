  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0199114b-2c3b-457a-9950-6a7a9fe19ec0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e275b8b9-1d00-4e95-90b4-963b889a819a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f4eceaa3-a9c3-4218-a67c-559faa174026\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0199114b-2c3b-457a-9950-6a7a9fe19ec0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#e9e1d4; color:#1B1A22; font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }\n  .doc { box-sizing:border-box; max-width:8.5in; margin:0 auto; background:#FAF7F2; box-shadow:0 8px 40px rgba(20,14,10,0.14); padding:0; }\n  .doc-frame { width:100%; border-collapse:collapse; }\n  .doc-frame td { padding:0; }\n  .hdr-space, .ftr-space { display:none; }\n  @page { size:letter; margin:0; }\n  @media print {\n    html { -webkit-print-color-adjust:exact; print-color-adjust:exact; }\n    html, body { margin:0; padding:0; background:#FAF7F2; }\n    .doc { max-width:none !important; margin:0 !important; box-shadow:none !important; }\n    .hdr-space, .ftr-space { display:table-cell; height:0.6in; }\n    h1, h2, h3 { break-after:avoid; }\n    .keep, figure, blockquote, img, tr { break-inside:avoid; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<main class=\"doc\">\n<table class=\"doc-frame\" role=\"presentation\">\n<thead><tr><td class=\"hdr-space\"><\u002Ftd><\u002Ftr><\u002Fthead>\n<tbody><tr><td>\n\n<!-- ============ COVER ============ -->\n<div style=\"padding:84px 72px 64px; background:#1B1A22; color:#FAF7F2;\">\n  <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:72px;\">\n    <img src=\"7b37ba82-3ff7-4709-8cd4-b90e4927f562\" width=\"44\" height=\"44\" alt=\"\">\n    <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:22px; letter-spacing:-0.01em;\">Aasan<span style=\"color:#D6A23E;\">.<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#D6A23E; margin-bottom:18px;\">Brand Guidelines<\u002Fdiv>\n  <div style=\"font-family:'Cormorant Garamond',serif; font-size:56px; line-height:1.05; font-weight:500; max-width:9in;\">The way Aasan looks,<br>sounds, and feels.<\u002Fdiv>\n  <div style=\"font-family:'DM Sans',sans-serif; font-size:15px; color:#cabfae; margin-top:24px; max-width:5.2in; line-height:1.6;\">The identity layer that sits above the design system. The tokens tell engineers <em>which<\u002Fem> colour; this tells everyone <em>why<\u002Fem>. Keep it in sync with <span style=\"font-family:monospace; color:#e9d9bd;\">tokens.css<\u002Fspan>.<\u002Fdiv>\n  <div style=\"display:flex; gap:40px; margin-top:56px; font-size:12px; color:#8b6b4a;\">\n    <div><div style=\"color:#cabfae; font-weight:600;\">Version<\u002Fdiv><div style=\"margin-top:3px;\">1.0 — Aasan teal/gold<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"color:#cabfae; font-weight:600;\">For<\u002Fdiv><div style=\"margin-top:3px;\">Product, design &amp; founders<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"color:#cabfae; font-weight:600;\">Pairs with<\u002Fdiv><div style=\"margin-top:3px;\">docs/design_system.md<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"padding:56px 72px 80px;\">\n\n  <!-- ============ THE IDEA ============ -->\n  <section style=\"margin-bottom:64px;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#0F7B83; margin-bottom:10px;\">01 — The idea<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:34px; line-height:1.15; margin:0 0 18px; text-wrap:balance;\">Aasan means <span style=\"font-style:italic;\">easy<\u002Fspan> — a seat to settle into. The brand's whole job is to make a busy front desk feel that way.<\u002Fh2>\n    <p style=\"font-size:15px; line-height:1.65; color:#44403c; max-width:6.4in; margin:0 0 28px; text-wrap:pretty;\">A receptionist looks at Aasan for eight hours. The brand should feel like a calm, capable colleague — never loud, never cold. Three traits hold that together, and every colour, word and pixel should be checkable against them.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n      <div style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; padding:20px;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:24px; color:#0F7B83;\">Premium<\u002Fdiv>\n        <div style=\"font-size:13px; color:#44403c; line-height:1.5; margin-top:8px;\">Refined through restraint — serif numerals, generous calm, nothing shouting. Quietly expensive.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; padding:20px;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:24px; color:#0F7B83;\">Trustworthy<\u002Fdiv>\n        <div style=\"font-size:13px; color:#44403c; line-height:1.5; margin-top:8px;\">Money is handled here. Clear, accurate, predictable. The brand never guesses or exaggerates.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; padding:20px;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:24px; color:#0F7B83;\">Friendly<\u002Fdiv>\n        <div style=\"font-size:13px; color:#44403c; line-height:1.5; margin-top:8px;\">Warm, plain-spoken, a little human. <em>Aasan<\u002Fem> is a seat — somewhere to settle in.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ LOGO ============ -->\n  <section style=\"margin-bottom:64px;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#0F7B83; margin-bottom:10px;\">02 — Logo &amp; mark<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:32px; line-height:1.15; margin:0 0 22px;\">The Seal — a ring that holds.<\u002Fh2>\n\n    <div style=\"display:grid; grid-template-columns:1.3fr 1fr; gap:16px; margin-bottom:18px;\">\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; padding:30px; display:flex; align-items:center; justify-content:center;\">\n        <img src=\"62f5f1ec-39ca-4972-8965-5af5a4bc8784\" width=\"300\" alt=\"Aasan logotype\" style=\"max-width:100%; height:auto;\">\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"background:#1B1A22; border-radius:12px; padding:30px; display:flex; align-items:center; justify-content:center;\">\n        <img src=\"54779eaf-8f28-41ea-a971-72cf227406cb\" width=\"240\" alt=\"Aasan logotype reversed\" style=\"max-width:100%; height:auto;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:14px; line-height:1.6; color:#44403c; max-width:6.4in; margin:0 0 26px;\">The mark is the <strong>Seal<\u002Fstrong>: a seat cradled inside a ring, with a single <span style=\"color:#b5882f; font-weight:600;\">gold spark<\u002Fspan> above. <em>Aasan<\u002Fem> means both <em>seat<\u002Fem> and <em>ease<\u002Fem> — the ring is what holds a busy front desk steady; the spark is the small daily win. That gold spark is the only note of celebration in the resting logo; it's why gold means <em>good news<\u002Fem> everywhere else. Use the full logotype where there's room; the Seal alone in tight spaces (favicon, app icon, avatars, the corner of a receipt).<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:16px;\">\n      <div style=\"background:#e6f4f5; border:1px solid #cfe6e4; border-radius:12px; padding:20px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#0b6069; font-weight:600; margin-bottom:12px;\">Do<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:18px; font-size:13px; line-height:1.7; color:#1B1A22;\">\n          <li>Keep clearspace of one mark-height on every side.<\u002Fli>\n          <li>Use the reversed mark on ink, photography, or teal.<\u002Fli>\n          <li>Minimum 20px for the mark, 88px wide for the logotype.<\u002Fli>\n          <li>Let the mark carry brand moments — loading, empty states, day-close.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:#fee2e2; border:1px solid #fecaca; border-radius:12px; padding:20px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#991b1b; font-weight:600; margin-bottom:12px;\">Don't<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:18px; font-size:13px; line-height:1.7; color:#1B1A22;\">\n          <li>Recolour the disc or drop the gold dot.<\u002Fli>\n          <li>Stretch, rotate, or add effects to the mark.<\u002Fli>\n          <li>Place the teal mark on a busy or low-contrast background.<\u002Fli>\n          <li>Keep shipping \"SalonOS\" — it's one brand now: Aasan.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ COLOR ============ -->\n  <section style=\"margin-bottom:64px;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#0F7B83; margin-bottom:10px;\">03 — Colour<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:32px; line-height:1.15; margin:0 0 14px;\">A duotone, not a single teal.<\u002Fh2>\n    <p style=\"font-size:15px; line-height:1.65; color:#44403c; max-width:6.4in; margin:0 0 26px; text-wrap:pretty;\">This is the rule that keeps an all-day screen from tiring the eye. Teal and gold carry <strong>different meanings<\u002Fstrong> and live on a calm cream canvas. If they ever fight for the same job, one is in the wrong place.<\u002Fp>\n\n    <!-- brand swatches -->\n    <div style=\"display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:14px;\">\n      <div class=\"keep\">\n        <div style=\"height:90px; border-radius:10px; background:#0F7B83;\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:13px; margin-top:9px;\">Teal<\u002Fdiv>\n        <div style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#0F7B83<\u002Fdiv>\n        <div style=\"font-size:11px; color:#44403c; margin-top:4px; line-height:1.4;\">Function — actions, links, active nav, focus.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\">\n        <div style=\"height:90px; border-radius:10px; background:#0B565C;\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:13px; margin-top:9px;\">Deep Teal<\u002Fdiv>\n        <div style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#0B565C<\u002Fdiv>\n        <div style=\"font-size:11px; color:#44403c; margin-top:4px; line-height:1.4;\">Depth — pressed states, the Seal's ring, dark UI.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\">\n        <div style=\"height:90px; border-radius:10px; background:#D6A23E;\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:13px; margin-top:9px;\">Gold<\u002Fdiv>\n        <div style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#D6A23E<\u002Fdiv>\n        <div style=\"font-size:11px; color:#44403c; margin-top:4px; line-height:1.4;\">Value — revenue, targets, milestones, reward.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\">\n        <div style=\"height:90px; border-radius:10px; background:#FAF7F2; border:1px solid #e3e0db;\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:13px; margin-top:9px;\">Cream<\u002Fdiv>\n        <div style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#FAF7F2<\u002Fdiv>\n        <div style=\"font-size:11px; color:#44403c; margin-top:4px; line-height:1.4;\">The room — ~70% of every screen.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\">\n        <div style=\"height:90px; border-radius:10px; background:#1B1A22;\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:13px; margin-top:9px;\">Ink<\u002Fdiv>\n        <div style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#1B1A22<\u002Fdiv>\n        <div style=\"font-size:11px; color:#44403c; margin-top:4px; line-height:1.4;\">Primary text &amp; dark brand moments.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\">\n        <div style=\"height:90px; border-radius:10px; background:#8b6b4a;\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:13px; margin-top:9px;\">Walnut<\u002Fdiv>\n        <div style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#8b6b4a<\u002Fdiv>\n        <div style=\"font-size:11px; color:#44403c; margin-top:4px; line-height:1.4;\">Muted text, labels, captions.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 60/30/10 bar -->\n    <div class=\"keep\" style=\"margin:22px 0 26px;\">\n      <div style=\"display:flex; height:38px; border-radius:9px; overflow:hidden; border:1px solid #e3e0db;\">\n        <div style=\"flex:7; background:#FAF7F2; display:flex; align-items:center; padding-left:14px; font-size:12px; font-weight:600; color:#8b6b4a;\">≈ 70% cream — the room<\u002Fdiv>\n        <div style=\"flex:2; background:#e6f4f5; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#0b6069;\">~20% surfaces<\u002Fdiv>\n        <div style=\"flex:0.6; background:#0F7B83;\"><\u002Fdiv>\n        <div style=\"flex:0.4; background:#D6A23E;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:12px; color:#8b6b4a; margin-top:8px;\">Teal + gold together rarely exceed 10% of a screen. That's what makes them register.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- semantic + surfaces -->\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px;\">\n      <div>\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#8b6b4a; font-weight:600; margin-bottom:12px;\">Semantic — state, never decoration<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:34px; height:20px; border-radius:5px; background:#dcfce7; border:1px solid #bbf7d0;\"><\u002Fspan><span style=\"font-size:13px; color:#166534; font-weight:600;\">Success<\u002Fspan><span style=\"font-size:12px; color:#8b6b4a;\">paid · completed · healthy<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:34px; height:20px; border-radius:5px; background:#fef3c7; border:1px solid #fde68a;\"><\u002Fspan><span style=\"font-size:13px; color:#92400e; font-weight:600;\">Warning<\u002Fspan><span style=\"font-size:12px; color:#8b6b4a;\">low stock · waiting · due soon<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:34px; height:20px; border-radius:5px; background:#fee2e2; border:1px solid #fecaca;\"><\u002Fspan><span style=\"font-size:13px; color:#991b1b; font-weight:600;\">Danger<\u002Fspan><span style=\"font-size:12px; color:#8b6b4a;\">failed · overdue · destructive<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:34px; height:20px; border-radius:5px; background:#dbeafe; border:1px solid #bfdbfe;\"><\u002Fspan><span style=\"font-size:13px; color:#1e40af; font-weight:600;\">Info<\u002Fspan><span style=\"font-size:12px; color:#8b6b4a;\">in progress · neutral status<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#8b6b4a; font-weight:600; margin-bottom:12px;\">Surfaces &amp; lines<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:34px; height:20px; border-radius:5px; background:#ffffff; border:1px solid #e3e0db;\"><\u002Fspan><span style=\"font-size:13px; font-weight:600;\">Card<\u002Fspan><span style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#FFFFFF<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:34px; height:20px; border-radius:5px; background:#f8f7f5; border:1px solid #e3e0db;\"><\u002Fspan><span style=\"font-size:13px; font-weight:600;\">Sidebar<\u002Fspan><span style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#f8f7f5<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:34px; height:20px; border-radius:5px; background:#fff; border:1px solid #e3e0db;\"><\u002Fspan><span style=\"font-size:13px; font-weight:600;\">Border<\u002Fspan><span style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#e3e0db<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:34px; height:20px; border-radius:5px; background:#e6f4f5; border:1px solid #cfe6e4;\"><\u002Fspan><span style=\"font-size:13px; font-weight:600;\">Teal soft<\u002Fspan><span style=\"font-family:monospace; font-size:11px; color:#8b6b4a;\">#e6f4f5<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"keep\" style=\"margin-top:24px; background:#fdf3de; border:1px solid #f0dcae; border-left:3px solid #D6A23E; border-radius:8px; padding:16px 18px;\">\n      <div style=\"font-weight:700; font-size:13px; color:#7a5a14; margin-bottom:4px;\">Housekeeping<\u002Fdiv>\n      <div style=\"font-size:13px; line-height:1.55; color:#5e4a1c;\">Your written <span style=\"font-family:monospace;\">design_system.md<\u002Fspan> still documents the old <strong>Copper<\u002Fstrong> accent and Instrument Serif / Inter. The live tokens are teal + gold + Cormorant / Space Grotesk / DM Sans. Sync the doc to the rebrand so the team isn't building against a retired palette.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TYPOGRAPHY ============ -->\n  <section style=\"margin-bottom:64px;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#0F7B83; margin-bottom:10px;\">04 — Typography<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:32px; line-height:1.15; margin:0 0 22px;\">Three voices, each with one job.<\u002Fh2>\n\n    <div style=\"display:flex; flex-direction:column; gap:14px;\">\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; padding:24px; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n        <div style=\"flex:1;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#8b6b4a; font-weight:600;\">Cormorant Garamond — display<\u002Fdiv>\n          <div style=\"font-size:13px; color:#44403c; margin-top:6px; line-height:1.5;\">Money, hero numbers, empty-state and auth headlines, brand moments. Used sparingly. <strong>Never on printed receipts.<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right;\">\n          <div style=\"font-family:'Cormorant Garamond',serif; font-size:46px; line-height:1; color:#1B1A22;\">₹6,480<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif; font-style:italic; font-size:20px; color:#44403c;\">Three rings to close.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; padding:24px; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n        <div style=\"flex:1;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#8b6b4a; font-weight:600;\">Space Grotesk — brand<\u002Fdiv>\n          <div style=\"font-size:13px; color:#44403c; margin-top:6px; line-height:1.5;\">The wordmark and small uppercase overline labels only. It's the brand's signature, not a body face.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:34px; color:#1B1A22;\">Aasan<span style=\"color:#0F7B83;\">.<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#8b6b4a;\">Today's revenue<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; padding:24px; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n        <div style=\"flex:1;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#8b6b4a; font-weight:600;\">DM Sans — interface<\u002Fdiv>\n          <div style=\"font-size:13px; color:#44403c; margin-top:6px; line-height:1.5;\">Every other word in the product. Quiet, legible, dense-friendly.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right; max-width:2.6in;\">\n          <div style=\"font-family:'DM Sans',sans-serif; font-size:15px; color:#1B1A22; line-height:1.5;\">Checked in, waiting — 4 guests. Avg. bill today ₹3,240.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:18px;\">\n      <div style=\"font-size:13px; line-height:1.6; color:#44403c;\"><strong style=\"color:#1B1A22;\">Tabular numerals everywhere money lives.<\u002Fstrong> Counts, time and currency use <span style=\"font-family:monospace; font-size:12px;\">tabular-nums<\u002Fspan> so columns align and digits don't jitter as they update.<\u002Fdiv>\n      <div style=\"font-size:13px; line-height:1.6; color:#44403c;\"><strong style=\"color:#1B1A22;\">Weight discipline.<\u002Fstrong> 400 body · 500 captions · 600 headings &amp; buttons · 700 money. No 300, no 800. Weight inflation is a smell.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ VOICE ============ -->\n  <section style=\"margin-bottom:64px;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#0F7B83; margin-bottom:10px;\">05 — Voice &amp; tone<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:32px; line-height:1.15; margin:0 0 14px;\">Copy is part of the brand.<\u002Fh2>\n    <p style=\"font-size:15px; line-height:1.65; color:#44403c; max-width:6.4in; margin:0 0 24px; text-wrap:pretty;\">Aasan already has a voice in the wild — it just isn't written down, so it drifts. It's <strong>calm, plain-spoken, and quietly warm<\u002Fstrong>: it says what staff already say, never announces absence, and always points to the next action.<\u002Fp>\n\n    <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:26px;\">\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:1fr 1.2fr; gap:0; border:1px solid #e3e0db; border-radius:10px; overflow:hidden;\">\n        <div style=\"background:#fee2e2; padding:14px 18px;\"><div style=\"font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#991b1b; margin-bottom:5px;\">Instead of<\u002Fdiv><div style=\"font-size:14px; color:#1B1A22;\">\"Dashboard\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; padding:14px 18px;\"><div style=\"font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#166534; margin-bottom:5px;\">Aasan says<\u002Fdiv><div style=\"font-size:14px; color:#1B1A22;\">\"Today\" — the word a receptionist actually thinks.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:1fr 1.2fr; gap:0; border:1px solid #e3e0db; border-radius:10px; overflow:hidden;\">\n        <div style=\"background:#fee2e2; padding:14px 18px;\"><div style=\"font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#991b1b; margin-bottom:5px;\">Instead of<\u002Fdiv><div style=\"font-size:14px; color:#1B1A22;\">\"₹0 revenue\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; padding:14px 18px;\"><div style=\"font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#166534; margin-bottom:5px;\">Aasan says<\u002Fdiv><div style=\"font-size:14px; color:#1B1A22;\">\"Drawer not opened yet. Opening float?\"<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:1fr 1.2fr; gap:0; border:1px solid #e3e0db; border-radius:10px; overflow:hidden;\">\n        <div style=\"background:#fee2e2; padding:14px 18px;\"><div style=\"font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#991b1b; margin-bottom:5px;\">Instead of<\u002Fdiv><div style=\"font-size:14px; color:#1B1A22;\">\"No data available\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; padding:14px 18px;\"><div style=\"font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#166534; margin-bottom:5px;\">Aasan says<\u002Fdiv><div style=\"font-size:14px; color:#1B1A22;\">\"No bookings yet today. First appointment at 10:00 — add a walk-in to start earlier.\"<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n      <div style=\"font-size:13px; line-height:1.6; color:#44403c;\"><strong style=\"color:#1B1A22;\">One word, everywhere.<\u002Fstrong> \"Customers\", never \"Guests\". Use the vocabulary staff already use — pick one term and hold it across the whole product.<\u002Fdiv>\n      <div style=\"font-size:13px; line-height:1.6; color:#44403c;\"><strong style=\"color:#1B1A22;\">Empty states guide.<\u002Fstrong> Every empty state names the next action. Absence is never the message.<\u002Fdiv>\n      <div style=\"font-size:13px; line-height:1.6; color:#44403c;\"><strong style=\"color:#1B1A22;\">Errors stay calm.<\u002Fstrong> Plain, specific, blame-free, and shown inline next to the field — never only in a toast.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ THE MARK AS A DEVICE ============ -->\n  <section style=\"margin-bottom:64px;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#0F7B83; margin-bottom:10px;\">06 — The Seal as a device<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:32px; line-height:1.15; margin:0 0 14px;\">Let the mark do more than sit in the corner.<\u002Fh2>\n    <p style=\"font-size:15px; line-height:1.65; color:#44403c; max-width:6.4in; margin:0 0 24px; text-wrap:pretty;\">The Seal is a small story — a ring that holds, a spark above. Personality lands when it shows up at the quiet and the celebratory moments — the spark glows gold when something good happens, the mark settles in cream when a screen is empty.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; padding:22px; text-align:center;\">\n        <div style=\"width:46px; height:46px; margin:0 auto 14px; opacity:0.5;\"><img src=\"e71cbcd8-069f-48a3-82b4-26bcad9fa628\" width=\"46\" height=\"46\" alt=\"\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:14px;\">Empty states<\u002Fdiv>\n        <div style=\"font-size:12px; color:#44403c; line-height:1.5; margin-top:5px;\">A faint mark above the headline — calm, not \"error\".<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"background:#1B1A22; border-radius:12px; padding:22px; text-align:center;\">\n        <div style=\"width:46px; height:46px; margin:0 auto 14px;\"><img src=\"7b37ba82-3ff7-4709-8cd4-b90e4927f562\" width=\"46\" height=\"46\" alt=\"\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:14px; color:#FAF7F2;\">Day-close &amp; targets<\u002Fdiv>\n        <div style=\"font-size:12px; color:#cabfae; line-height:1.5; margin-top:5px;\">Mark + gold when the day's target is met. The reward moment.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"background:#e6f4f5; border:1px solid #cfe6e4; border-radius:12px; padding:22px; text-align:center;\">\n        <div style=\"width:46px; height:46px; margin:0 auto 14px;\"><img src=\"e71cbcd8-069f-48a3-82b4-26bcad9fa628\" width=\"46\" height=\"46\" alt=\"\"><\u002Fdiv>\n        <div style=\"font-weight:700; font-size:14px;\">Loading &amp; login<\u002Fdiv>\n        <div style=\"font-size:12px; color:#44403c; line-height:1.5; margin-top:5px;\">A gentle pulse of the mark — one beat, never a spinner loop.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ APPLYING ============ -->\n  <section style=\"margin-bottom:64px;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#0F7B83; margin-bottom:10px;\">07 — Applying the brand<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:32px; line-height:1.15; margin:0 0 14px;\">A brand is felt at the edges.<\u002Fh2>\n    <p style=\"font-size:15px; line-height:1.65; color:#44403c; max-width:6.4in; margin:0 0 24px; text-wrap:pretty;\">The dashboard is already on-brand. The opportunity is everywhere the product touches a person beyond it — that's where Aasan goes from \"an app with nice colours\" to \"a brand a salon owner trusts.\"<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n      <div style=\"display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid #e3e0db; border-radius:10px; padding:16px;\"><span style=\"color:#166534; font-weight:700;\">✓<\u002Fspan><div><div style=\"font-weight:700; font-size:14px;\">In-app surfaces<\u002Fdiv><div style=\"font-size:12px; color:#44403c; line-height:1.5;\">Strong already. Hold the duotone discipline as new pages ship.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid #e3e0db; border-radius:10px; padding:16px;\"><span style=\"color:#166534; font-weight:700;\">✓<\u002Fspan><div><div style=\"font-weight:700; font-size:14px;\">Workspace identity<\u002Fdiv><div style=\"font-size:12px; color:#44403c; line-height:1.5;\">Salon + branch anchor the sidebar; Aasan recedes to a footer. <em>See §08.<\u002Fem><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid #e3e0db; border-radius:10px; padding:16px;\"><span style=\"color:#166534; font-weight:700;\">✓<\u002Fspan><div><div style=\"font-weight:700; font-size:14px;\">Login &amp; onboarding<\u002Fdiv><div style=\"font-size:12px; color:#44403c; line-height:1.5;\">First impression, designed — Cormorant headline, the mark, one warm line. <em>See §08.<\u002Fem><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid #e3e0db; border-radius:10px; padding:16px;\"><span style=\"color:#166534; font-weight:700;\">✓<\u002Fspan><div><div style=\"font-weight:700; font-size:14px;\">Day-close summary<\u002Fdiv><div style=\"font-size:12px; color:#44403c; line-height:1.5;\">The gold celebration moment — the mark, the day's number, one line. <em>See §08.<\u002Fem><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid #e3e0db; border-radius:10px; padding:16px;\"><span style=\"color:#166534; font-weight:700;\">✓<\u002Fspan><div><div style=\"font-weight:700; font-size:14px;\">Printed receipt<\u002Fdiv><div style=\"font-size:12px; color:#44403c; line-height:1.5;\">80mm, 1-bit — brand survives as mark + one warm line. <em>See §08.<\u002Fem><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid #e3e0db; border-radius:10px; padding:16px;\"><span style=\"color:#b5882f; font-weight:700;\">→<\u002Fspan><div><div style=\"font-weight:700; font-size:14px;\">One brand, both apps<\u002Fdiv><div style=\"font-size:12px; color:#44403c; line-height:1.5;\">Still to do: retire \"SalonOS\" so both apps read as one company — Aasan.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BRAND MOMENTS, REALIZED ============ -->\n  <section style=\"margin-bottom:24px;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#0F7B83; margin-bottom:10px;\">08 — Brand moments, realized<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:32px; line-height:1.15; margin:0 0 14px;\">From kit to brand.<\u002Fh2>\n    <p style=\"font-size:15px; line-height:1.65; color:#44403c; max-width:6.4in; margin:0 0 24px; text-wrap:pretty;\">Four surfaces beyond the dashboard, each built to the system above. Same tokens, same voice — but a different emotional register on each: teal leads where you act, gold leads where you're rewarded, and on paper only the mark and one line remain.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n\n      <!-- login -->\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; overflow:hidden;\">\n        <div style=\"height:158px; display:flex;\">\n          <div style=\"flex:1; background:#1B1A22; padding:18px; display:flex; flex-direction:column; justify-content:center;\">\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size:8px; letter-spacing:0.16em; text-transform:uppercase; color:#D6A23E; margin-bottom:8px;\">Welcome back<\u002Fdiv>\n            <div style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:26px; color:#FAF7F2; line-height:1;\">Good morning.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; background:#fff; padding:18px; display:flex; flex-direction:column; justify-content:center; gap:9px;\">\n            <div style=\"font-family:'Cormorant Garamond',serif; font-size:19px; color:#1B1A22;\">Sign in<\u002Fdiv>\n            <div style=\"height:11px; background:#f1efeb; border:1px solid #e3e0db; border-radius:4px;\"><\u002Fdiv>\n            <div style=\"height:11px; background:#f1efeb; border:1px solid #0F7B83; border-radius:4px;\"><\u002Fdiv>\n            <div style=\"height:24px; background:#0F7B83; border-radius:5px;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px; border-top:1px solid #eeece9;\">\n          <div style=\"font-weight:700; font-size:14px; color:#1B1A22;\">Login<\u002Fdiv>\n          <div style=\"font-size:12px; color:#44403c; line-height:1.5; margin-top:3px;\">Teal leads the one action; Cormorant carries the welcome. The first impression of Aasan.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- day-close -->\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; overflow:hidden;\">\n        <div style=\"height:158px; background:#1B1A22; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; position:relative; overflow:hidden;\">\n          <div style=\"position:absolute; top:-60px; left:50%; transform:translateX(-50%); width:240px; height:160px; border-radius:50%; background:radial-gradient(ellipse, rgba(214,162,62,0.22) 0%, rgba(214,162,62,0) 66%);\"><\u002Fdiv>\n          <img src=\"7b37ba82-3ff7-4709-8cd4-b90e4927f562\" width=\"24\" height=\"24\" alt=\"\" style=\"position:relative;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:8px; letter-spacing:0.18em; text-transform:uppercase; color:#D6A23E; position:relative;\">Day closed<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:34px; color:#D6A23E; line-height:1; position:relative;\">₹24,860<\u002Fdiv>\n          <div style=\"font-size:9px; font-weight:600; color:#e9c987; background:rgba(214,162,62,0.14); border:1px solid rgba(214,162,62,0.35); padding:3px 10px; border-radius:20px; position:relative;\">Target met · 124%<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px; border-top:1px solid #eeece9;\">\n          <div style=\"font-weight:700; font-size:14px; color:#1B1A22;\">Day-close<\u002Fdiv>\n          <div style=\"font-size:12px; color:#44403c; line-height:1.5; margin-top:3px;\">The one screen where gold leads — the reward register. Counterpoint to login.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- workspace identity -->\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; overflow:hidden;\">\n        <div style=\"height:158px; background:#f8f7f5; padding:14px; display:flex; flex-direction:column;\">\n          <div style=\"display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:9px; background:#fff; border:1px solid #e3e0db;\">\n            <div style=\"width:32px; height:32px; border-radius:8px; background:#0F7B83; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; color:#fff;\">M<\u002Fdiv>\n            <div style=\"min-width:0;\"><div style=\"font-weight:700; font-size:12px; color:#1B1A22;\">Maya Salon &amp; Spa<\u002Fdiv><div style=\"font-size:10px; color:#8b6b4a;\">Koramangala<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:7px; margin-top:14px; padding:0 8px;\">\n            <div style=\"height:7px; width:70%; background:#e6f4f5; border-radius:3px;\"><\u002Fdiv>\n            <div style=\"height:7px; width:55%; background:#eeece9; border-radius:3px;\"><\u002Fdiv>\n            <div style=\"height:7px; width:60%; background:#eeece9; border-radius:3px;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:auto; display:flex; align-items:center; gap:6px; padding:6px 8px 0; border-top:1px solid #eeece9;\"><img src=\"e71cbcd8-069f-48a3-82b4-26bcad9fa628\" width=\"13\" height=\"13\" alt=\"\" style=\"opacity:0.85;\"><span style=\"font-size:10px; color:#8b6b4a;\">Powered by <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; color:#5c574f;\">Aasan<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px; border-top:1px solid #eeece9;\">\n          <div style=\"font-weight:700; font-size:14px; color:#1B1A22;\">Workspace identity<\u002Fdiv>\n          <div style=\"font-size:12px; color:#44403c; line-height:1.5; margin-top:3px;\">The salon is the hero, top of the sidebar; Aasan is the platform underneath.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- receipt -->\n      <div class=\"keep\" style=\"background:#fff; border:1px solid #e3e0db; border-radius:12px; overflow:hidden;\">\n        <div style=\"height:158px; background:#efece6; display:flex; align-items:flex-start; justify-content:center; padding-top:16px;\">\n          <div style=\"width:158px; background:#fff; box-shadow:0 4px 14px rgba(20,14,10,0.12); padding:12px 14px 0; box-sizing:border-box; font-family:ui-monospace,monospace; font-size:8px; color:#000; text-align:center;\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 64 64\" style=\"display:block; margin:0 auto 4px;\"><circle cx=\"32\" cy=\"32\" r=\"23\" fill=\"#000\"><\u002Fcircle><path d=\"M22 33 C24 42, 40 42, 42 33\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><circle cx=\"32\" cy=\"35\" r=\"3.4\" fill=\"#fff\"><\u002Fcircle><circle cx=\"32\" cy=\"21\" r=\"3.4\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n            <div style=\"font-family:'DM Sans',sans-serif; font-weight:700; font-size:10px;\">MAYA SALON &amp; SPA<\u002Fdiv>\n            <div style=\"border-top:1px dashed #000; margin:7px 0;\"><\u002Fdiv>\n            <div style=\"font-family:'DM Sans',sans-serif; font-weight:700; font-size:8px; letter-spacing:0.12em;\">TAX INVOICE<\u002Fdiv>\n            <div style=\"border-top:1px dashed #000; margin:7px 0;\"><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between;\"><span>Haircut<\u002Fspan><span>600.00<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between;\"><span>Hair Spa<\u002Fspan><span>1200.00<\u002Fspan><\u002Fdiv>\n            <div style=\"border-top:1px solid #000; margin:7px 0;\"><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; font-family:'DM Sans',sans-serif; font-weight:700; font-size:10px;\"><span>TOTAL<\u002Fspan><span>₹1,890<\u002Fspan><\u002Fdiv>\n            <div style=\"height:10px; margin:8px -14px 0; background:repeating-linear-gradient(90deg,#fff 0 4px,transparent 4px 8px); border-top:1px dashed #999;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px; border-top:1px solid #eeece9;\">\n          <div style=\"font-weight:700; font-size:14px; color:#1B1A22;\">Thermal receipt<\u002Fdiv>\n          <div style=\"font-size:12px; color:#44403c; line-height:1.5; margin-top:3px;\">1-bit, 80mm. No colour, no serif — the brand carries on the mark and the voice alone.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top:1px solid #e3e0db; margin-top:40px; padding-top:18px; display:flex; align-items:center; justify-content:space-between;\">\n    <div style=\"display:flex; align-items:center; gap:9px;\"><img src=\"e71cbcd8-069f-48a3-82b4-26bcad9fa628\" width=\"20\" height=\"20\" alt=\"\"><span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px;\">Aasan<span style=\"color:#0F7B83;\">.<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <div style=\"font-size:12px; color:#8b6b4a;\">Brand Guidelines v1.0 — keep in sync with tokens.css<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Ftd><\u002Ftr><\u002Ftbody>\n<tfoot><tr><td class=\"ftr-space\"><\u002Ftd><\u002Ftr><\u002Ftfoot>\n<\u002Ftable>\n<\u002Fmain>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
